{% extends "base.html" %}

{% block content %}
<h2>Login</h2>
<form method="POST" class="auth-form">
    <label>Usuário:</label>
    <input type="text" name="username" required>
    <label>Senha:</label>
    <input type="password" name="password" required>
    <button type="submit">Entrar</button>
</form>
<p><a href="{{ url_for('index') }}">← Voltar ao início</a></p>
{% endblock %}
